name: Tailscale RDP Loop

on:
  workflow_dispatch:
    inputs:
      github_token:
        description: 'Enter your GitHub Personal Access Token (Classic)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Download and Install Tailscale
        run: |
          winget install Tailscale.Tailscale --silent --accept-package-agreements --accept-source-agreements

      - name: Connect to Tailscale
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --accept-routes

      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Create User and Password
        run: |
          $Password = ConvertTo-SecureString "admin@123" -AsPlainText -Force
          New-LocalUser -Name "toolboxlab" -Password $Password -Description "RDP User"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "toolboxlab"
          Add-LocalGroupMember -Group "Administrators" -Member "toolboxlab"

      - name: Display Connection Details
        run: |
          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host "=========================================="
          Write-Host "RDP IP Address: $ip"
          Write-Host "Username: toolboxlab"
          Write-Host "Password: admin@123"
          Write-Host "=========================================="

      - name: RDP Active Session Loop (Keep Alive)
        run: |
          $start = Get-Date
          while ((Get-Date) -lt $start.AddHours(5).AddMinutes(30)) {
              Start-Sleep -Seconds 60
          }

      - name: Trigger Next Loop (Auto Restart)
        run: |
          $owner = "${{ github.repository_owner }}"
          $repo = "${{ github.event.repository.name }}"
          $token = "${{ github.event.inputs.github_token }}"
          
          $headers = @{
              "Authorization" = "token $token"
              "Accept"        = "application/vnd.github.v3+json"
          }
          
          $uri = "https://api.github.com/repos/$owner/$repo/actions/workflows/tailscale-rdp-loop.yml/dispatches"
          $body = '{"ref":"main", "inputs": {"github_token": "' + $token + '"}}'
          
          Invoke-RestMethod -Uri $uri -Method Post -Headers $headers -Body $body -ContentType "application/json"
